<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32 Weather Station</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
}

:root{
    --bg:#f4f7fb;
    --card:#ffffff;
    --text:#0f172a;
    --sub:#64748b;
    --border:#e2e8f0;
    --primary:#2563eb;
    --success:#22c55e;
    --warning:#f59e0b;
    --danger:#ef4444;
    --shadow:0 8px 24px rgba(15,23,42,.08);
}

body{
    background:var(--bg);
    color:var(--text);
    padding:16px;
}

.container{
    max-width:460px;
    margin:auto;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
}

.title h1{
    font-size:1.45rem;
    font-weight:700;
}

.title p{
    color:var(--sub);
    font-size:.85rem;
    margin-top:3px;
}

.headerButtons{
    display:flex;
    gap:10px;
}

.headerButtons button{
    width:42px;
    height:42px;
    border:none;
    border-radius:14px;
    background:var(--card);
    box-shadow:var(--shadow);
    cursor:pointer;
    font-size:1rem;
    transition:.25s;
}

.headerButtons button:hover{
    transform:translateY(-2px);
}

.statusBar{
    background:var(--card);
    border-radius:18px;
    box-shadow:var(--shadow);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
    margin-bottom:14px;
}

.status{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:.85rem;
    font-weight:600;
}

.onlineDot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--success);
    animation:pulse 2s infinite;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
}

.card{
    background:var(--card);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:18px;
    min-height:150px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    transition:.25s;
}

.card:hover{
    transform:translateY(-3px);
}

.icon{
    width:42px;
    height:42px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f8fafc;
    border-radius:14px;
}

.icon svg{
    width:24px;
    height:24px;
}

.value{
    font-size:2rem;
    font-weight:700;
    line-height:1;
}

.value span{
    font-size:.95rem;
    color:var(--primary);
    margin-left:3px;
    font-weight:600;
}

.label{
    color:var(--sub);
    font-size:.9rem;
    font-weight:500;
}

.aqiCard{
    grid-column:1/3;
    background:var(--card);
    border-radius:22px;
    box-shadow:var(--shadow);
    padding:22px;
}

.aqiTitle{
    color:var(--sub);
    font-size:.95rem;
    font-weight:600;
}

.aqiValue{
    font-size:3.2rem;
    font-weight:700;
    margin-top:8px;
}

.aqiStatus{
    color:var(--success);
    font-size:1.15rem;
    font-weight:700;
    margin-top:4px;
}

.aqiBar{
    margin:18px 0;
    height:10px;
    background:#e2e8f0;
    border-radius:30px;
    overflow:hidden;
}

.aqiFill{
    width:72%;
    height:100%;
    background:linear-gradient(90deg,#22c55e,#84cc16,#facc15,#fb923c,#ef4444);
    border-radius:30px;
}

.aqiText{
    color:var(--sub);
    font-size:.9rem;
}

.smallCard{
    min-height:100px;
}

.smallTitle{
    color:var(--sub);
    font-size:.85rem;
}

.systemState{
    font-size:1.15rem;
    font-weight:700;
}

.systemState.normal{
    color:var(--success);
}

.systemState.warning{
    color:var(--warning);
}

.systemState.danger{
    color:var(--danger);
}

.alarmState{
    font-size:1.15rem;
    font-weight:700;
    color:var(--danger);
}

.bottomBar{
    margin-top:14px;
    background:var(--card);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:14px 18px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:.9rem;
    font-weight:600;
    color:var(--sub);
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:.3;}
    100%{opacity:1;}
}

@media(max-width:370px){

.grid{
    gap:10px;
}

.card{
    padding:14px;
    min-height:135px;
}

.value{
    font-size:1.7rem;
}

.headerButtons button{
    width:38px;
    height:38px;
}

}
</style>
</head>
<script>

const values={
temperature:28.4,
humidity:64,
pressure:1008,
light:512,
aqi:84,
clients:1
};

function updateUI(){

document.getElementById("temperature").innerHTML=values.temperature+"<span>°C</span>";
document.getElementById("humidity").innerHTML=values.humidity+"<span>%</span>";
document.getElementById("pressure").innerHTML=values.pressure+"<span>hPa</span>";
document.getElementById("light").innerHTML=values.light+"<span>Lux</span>";
document.getElementById("aqi").innerText=values.aqi;
document.getElementById("clients").innerText=values.clients;

let status=document.getElementById("aqiStatus");
let fill=document.querySelector(".aqiFill");
let system=document.querySelector(".systemState");

if(values.aqi<=50){
status.innerText="GOOD";
status.style.color="#22c55e";
fill.style.width="20%";
system.innerHTML="🟢 Normal";
system.style.color="#22c55e";
}

else if(values.aqi<=100){
status.innerText="MODERATE";
status.style.color="#f59e0b";
fill.style.width="45%";
system.innerHTML="🟡 Warning";
system.style.color="#f59e0b";
}

else{
status.innerText="POOR";
status.style.color="#ef4444";
fill.style.width="80%";
system.innerHTML="🔴 Critical";
system.style.color="#ef4444";
}

document.getElementById("updated").innerText=
new Date().toLocaleTimeString();

}

updateUI();

setInterval(updateUI,1000);

</script>
<body>

<body>

<div class="container">

<header>

<div class="title">
<h1>Smart Environment Monitor</h1>
<p>ESP32-WROOM-32</p>
</div>

<div class="headerButtons">
<button id="themeBtn">🌙</button>
<button id="infoBtn">ⓘ</button>
</div>

</header>

<div class="statusBar">

<div class="status">
<span class="onlineDot"></span>
<span>Online</span>
</div>

<div class="status">
<span>👥</span>
<span id="clients">1</span>
</div>

<div class="status">
<span>📶</span>
<span>AP</span>
</div>

<div class="status">
<span>🔄</span>
<span>Live</span>
</div>

</div>

<div class="grid">

<div class="card">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<path d="M14 14.76V5a2 2 0 10-4 0v9.76a4 4 0 104 0z"/>

</svg>

</div>

<div class="value" id="temperature">28.4<span>°C</span></div>

<div class="label">Temperature</div>

</div>

<div class="card">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<path d="M12 2C8 7 6 10 6 13a6 6 0 0012 0c0-3-2-6-6-11z"/>

</svg>

</div>

<div class="value" id="humidity">64<span>%</span></div>

<div class="label">Humidity</div>

</div>

<div class="card">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<circle cx="12" cy="12" r="8"/>

<path d="M12 12l4-4"/>

</svg>

</div>

<div class="value" id="pressure">1008<span>hPa</span></div>

<div class="label">Pressure</div>

</div>

<div class="card">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<circle cx="12" cy="12" r="4"/>

<path d="M12 2v2"/>

<path d="M12 20v2"/>

<path d="M4.93 4.93l1.41 1.41"/>

<path d="M17.66 17.66l1.41 1.41"/>

<path d="M2 12h2"/>

<path d="M20 12h2"/>

<path d="M4.93 19.07l1.41-1.41"/>

<path d="M17.66 6.34l1.41-1.41"/>

</svg>

</div>

<div class="value" id="light">512<span>Lux</span></div>

<div class="label">Light</div>

</div>

<div class="aqiCard">

<div class="aqiTitle">Air Quality</div>

<div class="aqiValue" id="aqi">84</div>

<div class="aqiStatus" id="aqiStatus">GOOD</div>

<div class="aqiBar">

<div class="aqiFill"></div>

</div>

<div class="aqiText">Healthy Environment</div>

</div>

<div class="card smallCard">

<div class="smallTitle">System</div>

<div class="systemState normal">

● Normal

</div>

</div>

<div class="card smallCard">

<div class="smallTitle">Alarm</div>

<div class="alarmState">

OFF

</div>

</div>

</div>

<div class="bottomBar">

<div>

🕒

<span id="updated">

Just Now

</span>

</div>

</div>

</div>

</body>
</body>
</html>
